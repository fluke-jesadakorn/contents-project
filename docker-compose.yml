version: "3.9"

services:
  # ===== Postgres 16 with pgvector (static IP) =====
  postgres:
    image: pgvector/pgvector:pg16
    container_name: contract-postgres
    restart: unless-stopped
    networks:
      contract-net:
        ipv4_address: 172.30.0.10
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-contract}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-contractpw}
      POSTGRES_DB: ${POSTGRES_DB:-contracts}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-contract} -d ${POSTGRES_DB:-contracts}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ===== MinIO =====
  minio:
    image: minio/minio:latest
    container_name: contract-minio
    restart: unless-stopped
    networks:
      - contract-net
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: contract-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - contract-net
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      (mc mb local/${MINIO_BUCKET:-contracts} || true) &&
      mc anonymous set download local/${MINIO_BUCKET:-contracts} || true &&
      echo 'MinIO bucket ${MINIO_BUCKET:-contracts} ready'
      "
    restart: "no"

  # ===== n8n (self-hosted) =====
  n8n:
    image: n8nio/n8n:latest
    container_name: contract-n8n
    restart: unless-stopped
    networks:
      contract-net:
        ipv4_address: 172.30.0.20
    env_file: .env
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-contract}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-contractpw}
      N8N_PORT: 5678
      N8N_HOST: 0.0.0.0
      N8N_PROTOCOL: http
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      # editorBaseUrl controls getInstanceBaseUrl() in url.service.js — used for
      # telemetry proxy + OAuth callback + frontend API base. Must match the
      # public URL the browser accesses, otherwise CORS/loopback blocks login.
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-${N8N_PUBLIC_URL:-http://localhost:5678/}}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Asia/Bangkok}
      N8N_SECURE_COOKIE: "false"
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN:-}
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET:-}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-bge-m3}
      EMBED_DIM: ${EMBED_DIM:-1024}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_CHAT_MODEL: ${OPENROUTER_CHAT_MODEL:-google/gemma-4-31b-it:free}
      OPENROUTER_REFERER: ${OPENROUTER_REFERER:-http://localhost:5678/}
      OPENROUTER_TITLE: ${OPENROUTER_TITLE:-Contract RAG PoC}
      N8N_SSRF_PROTECTION_ENABLED: "true"
      N8N_SSRF_ALLOWED_IP_RANGES: "172.30.0.0/24,172.18.0.0/24"
      N8N_RUNNERS_ENABLED: "false"
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: 24
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ===== Postgres HTTP Gateway (workaround for n8n 2.x pg DNS bug) =====
  # Bypasses the native n8n Postgres node (which fails DNS in 2.26.4)
  # by wrapping psycopg2 in a tiny FastAPI service. n8n calls this via
  # HTTP Request node with payload {query, params}.
  pg-gateway:
    build: ./pg-gateway
    container_name: contract-pg-gateway
    restart: unless-stopped
    networks:
      - contract-net
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: contracts
      PG_USER: contract
      PG_PASSWORD: contractpw
    ports:
      - "5434:5433"
    depends_on:
      postgres:
        condition: service_healthy

networks:
  contract-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  pgdata:
  minio_data:
  n8n_data:
